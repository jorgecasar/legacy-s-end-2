# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: "AI Orchestration"

author: "jorgecasar"
description: "Autonomously plans, implements, or reviews GitHub issues/PRs using AI."
branding:
  icon: "cpu"
  color: "purple"
inputs:
  agent_role:
    description: "The role of the AI agent to execute: planner, developer, or reviewer."
    required: true
  gh_token:
    description: "A GitHub token with access to issues and PRs."
    required: true
  gh_mcp_pat:
    description: "Personal Access Token for GitHub MCP server (if different from gh_token)."
    required: false
  gemini_api_key:
    description: "Specific API key for Gemini models."
    required: false
  anthropic_api_key:
    description: "Specific API key for Anthropic (Claude) models."
    required: false
  openai_api_key:
    description: "Specific API key for OpenAI (GPT) models."
    required: false
  max_input_tokens:
    description: "Maximum estimated input tokens to allow."
    required: false
    default: "200000"
  max_output_tokens:
    description: "Maximum output tokens for the AI response."
    required: false
    default: "200000"
  simulation_mode:
    description: "Force simulation mode (Dry Run). Useful for testing without cost."
    required: false
    default: "false"
  debug:
    description: "Enable debug mode to stream AI agent logs in real-time."
    required: false
    default: "false"
  interactive:
    description: "Launch gemini-cli in interactive mode (TUI) - Recommended for local dev only."
    required: false
    default: "false"
  issue_number:
    description: "Specific issue number to act upon (required for manual trigger)."
    required: false
  pull_number:
    description: "Specific Pull Request number to act upon (required for manual trigger)."
    required: false
  project_id:
    description: "GitHub Project ID (required for 'orchestrate' role)."
    required: false
  wip_limit:
    description: "Work In Progress limit for Kanban columns."
    required: false
    default: "5"
  planner_system_prompt:
    description: "Custom system prompt for the AI Planner."
    required: false
  planner_user_prompt:
    description: "Custom user prompt template for the AI Planner. Use {{title}}, {{body}}, and {{repo}} placeholders."
    required: false
  planner_response_template:
    description: "Custom response template for the AI Planner."
    required: false
  developer_system_prompt:
    description: "Custom system prompt for the AI Developer."
    required: false
  developer_user_prompt:
    description: "Custom user prompt template for the AI Developer. Use {{context}} and {{repo}} placeholders."
    required: false
  reviewer_system_prompt:
    description: "Custom system prompt for the AI Reviewer."
    required: false
  reviewer_user_prompt:
    description: "Custom user prompt template for the AI Reviewer. Use {{diff}} and {{repo}} placeholders."
    required: false
  git_author_name:
    description: "Git author name for commits made by the AI agent."
    required: false
  git_author_email:
    description: "Git author email for commits made by the AI agent."
    required: false
runs:
  using: "node20"
  main: "dist/index.js"
