# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: "AI Orchestration"

author: "jorgecasar"
description: "Autonomously plans, implements, or reviews GitHub issues/PRs using AI."
branding:
  icon: "cpu"
  color: "purple"
inputs:
  agent_role:
    description: "The role of the AI agent to execute: planner, developer, or reviewer."
    required: true
  github_token:
    description: "A GitHub token with access to issues and PRs."
    required: true
  ai_api_key:
    description: "API key for the AI model."
    required: true
  planner_system_prompt:
    description: "Custom system prompt for the AI Planner."
    required: false
  planner_user_prompt:
    description: "Custom user prompt template for the AI Planner. Use {{title}}, {{body}}, and {{repo}} placeholders."
    required: false
  planner_response_template:
    description: "Custom response template for the AI Planner."
    required: false
  developer_system_prompt:
    description: "Custom system prompt for the AI Developer."
    required: false
  developer_user_prompt:
    description: "Custom user prompt template for the AI Developer. Use {{context}} and {{repo}} placeholders."
    required: false
  reviewer_system_prompt:
    description: "Custom system prompt for the AI Reviewer."
    required: false
  reviewer_user_prompt:
    description: "Custom user prompt template for the AI Reviewer. Use {{diff}} and {{repo}} placeholders."
    required: false
runs:
  using: "node20"
  main: "dist/index.js"
