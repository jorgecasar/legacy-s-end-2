name: AI Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pull_number:
        description: "PR number to review (optional for manual run)"
        required: false
      debug:
        description: "Enable debug mode (stream logs)"
        type: boolean
        default: false

jobs:
  validate:
    name: Check and Test
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.check.outcome }}
      output: ${{ steps.capture.outputs.text }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Check
        id: check
        continue-on-error: true
        run: |
          npm run check:fast > check_output.txt 2>&1

      - name: Capture Output
        id: capture
        if: always()
        run: |
          OUTPUT=$(cat check_output.txt | tail -c 5000)
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Finalize
        if: steps.check.outcome == 'failure'
        run: |
          cat check_output.txt
          exit 1

  e2e-tests:
    needs: validate
    if: needs.validate.result == 'success'
    uses: ./.github/workflows/reusable-e2e.yml
    with:
      node-version: "24"

  review:
    name: AI Architecture Review
    needs: [validate, e2e-tests]
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Determine Verification Result
        id: status
        run: |
          if [ "${{ needs.validate.result }}" == "success" ] && [ "${{ needs.e2e-tests.result }}" == "success" ]; then
            echo "res=success" >> $GITHUB_OUTPUT
          else
            echo "res=failure" >> $GITHUB_OUTPUT
          fi

      - name: Run AI Reviewer
        uses: ./packages/ai-orchestration
        with:
          agent_role: "reviewer"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          pull_number: ${{ github.event.pull_request.number || inputs.pull_number }}
          debug: ${{ github.event.inputs.debug || 'false' }}
          git_author_name: "Alarion"
          git_author_email: "alarion[bot]@users.noreply.github.com"
          verification_result: ${{ steps.status.outputs.res }}
          verification_output: ${{ needs.validate.outputs.output }}
