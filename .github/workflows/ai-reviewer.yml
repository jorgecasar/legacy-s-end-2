name: AI Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pull_number:
        description: "PR number to review"
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Code Review (Architecture & Standards)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Rulesync Rules
        run: npx rulesync generate

      - name: Run AI Reviewer
        uses: ./packages/ai-orchestration
        with:
          agent_role: "reviewer"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          pull_number: ${{ inputs.pull_number }}
          git_author_name: "Alarion"
          git_author_email: "alarion[bot]@users.noreply.github.com"
