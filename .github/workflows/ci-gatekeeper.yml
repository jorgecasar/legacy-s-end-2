name: CI Gatekeeper

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  validate:
    name: Lint, Format, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting (Oxfmt)
        run: npm run format:check

      - name: Run Linter (Oxlint)
        run: npm run lint

      - name: Run CI Script Tests (Node.js Test)
        run: npm run test:ci

      - name: Check Types (TypeScript JSDoc)
        run: npm run lint:types
