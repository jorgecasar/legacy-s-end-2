name: "AI Master Orchestrator"

on:
  schedule:
    # Run every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      simulation_mode:
        description: "Run in simulation mode (dry run)"
        type: boolean
        default: false
      debug:
        description: "Enable debug mode (stream logs)"
        type: boolean
        default: false
      interactive:
        description: "Enable interactive mode (TUI)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  orchestrate:
    name: Project Triage & Selection
    runs-on: ubuntu-latest
    outputs:
      selected_task_number: ${{ steps.orchestrate.outputs.selected_task_number }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Master Orchestrator
        id: orchestrate
        uses: ./packages/ai-orchestration
        with:
          agent_role: "orchestrate"
          gh_token: ${{ secrets.GH_MCP_PAT || secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          project_id: ${{ vars.PROJECT_ID }}
          simulation_mode: ${{ github.event.inputs.simulation_mode || 'false' }}
          debug: ${{ github.event.inputs.debug || 'false' }}
          interactive: ${{ github.event.inputs.interactive || 'false' }}
          wip_limit: "5"
          git_author_name: "Alarion"
          git_author_email: "alarion[bot]@users.noreply.github.com"

  run-agent:
    name: Execute Selected Task
    needs: orchestrate
    if: needs.orchestrate.outputs.selected_task_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: AI Implementation Agent
        uses: ./packages/ai-orchestration
        with:
          agent_role: "developer"
          gh_token: ${{ secrets.GH_MCP_PAT || secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          issue_number: ${{ needs.orchestrate.outputs.selected_task_number }}
          debug: ${{ github.event.inputs.debug || 'false' }}
          interactive: ${{ github.event.inputs.interactive || 'false' }}
          git_author_name: "Alarion"
          git_author_email: "alarion[bot]@users.noreply.github.com"
