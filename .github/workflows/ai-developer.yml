name: AI Developer Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
      debug:
        description: "Enable debug mode (stream logs)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.issue_number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  develop:
    name: Autonomous Coding Agent
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'ready-for-dev') ||
      (github.event.comment && github.event.sender.login == github.repository_owner && contains(github.event.comment.body, '/implement'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Rulesync Rules
        run: npx rulesync generate

      - name: Run Autonomous Developer
        uses: ./packages/ai-orchestration
        with:
          agent_role: "developer"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          gh_mcp_pat: ${{ secrets.GH_MCP_PAT || secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          issue_number: ${{ inputs.issue_number || github.event.issue.number }}
          debug: ${{ github.event.inputs.debug || 'false' }}
          git_author_name: "Alarion"
          git_author_email: "alarion[bot]@users.noreply.github.com"

  e2e-tests:
    needs: develop
    uses: ./.github/workflows/reusable-e2e.yml
    with:
      node-version: "24"
